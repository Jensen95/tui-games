name: Prerelease

# Publishes a rolling "edge" prerelease on every push to master, so unreleased
# features are downloadable before a real vX.Y.Z tag is cut. The single `edge`
# release is replaced each run; its version (see .goreleaser.yaml `snapshot`)
# counts commits since the last tag and resets when a new release is tagged.
on:
  push:
    branches:
      - master

permissions:
  contents: write

# Never let two edge builds race to update the same release.
concurrency:
  group: prerelease
  cancel-in-progress: true

jobs:
  prerelease:
    name: Edge prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      # The edge tag is created/deleted via the Releases API (--cleanup-tag /
      # --target), never `git push`: the default token may not push refs whose
      # history touches .github/workflows/ (needs the `workflows` permission),
      # but API-side tag creation is exempt from that check.
      - name: Publish rolling edge prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(git describe --tags --exclude edge --always)"
          printf 'Rolling prerelease built from the latest `master` (`%s`).\n\nVersion `%s`. Replaced on every push to master and reset when a new `vX.Y.Z` release is tagged. **Not for production use.**\n' "$GITHUB_SHA" "$version" > notes.md
          # Replace the previous edge release + tag so it always points at latest master.
          gh release delete edge --cleanup-tag --yes || true
          gh release create edge \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Edge build ($version)" \
            --notes-file notes.md \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
