name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & dependency guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint (gofmt + vet + depguard)
        run: task lint

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Race run uses a reduced seed count (the race detector slows the
      # generators 10-50x; latency-budget tests self-skip), then the
      # full-seed uninstrumented sweep runs the latency budgets.
      - name: Tests (task test:ci)
        run: task test:ci
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: go build
        run: go build ./...
      - name: Headless smoke test
        run: |
          task build
          ./lig games
          # Once game engines land, generate + verify one puzzle per game.
          for g in $(./lig games | awk '$1 != "no" {print $1}'); do
            ./lig generate --game "$g" --count 2 --seed 7 --out /tmp/smoke
          done
          if ls /tmp/smoke/*.json >/dev/null 2>&1; then ./lig verify /tmp/smoke/*.json; fi
