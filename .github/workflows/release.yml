name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag and release, e.g. v0.0.21 (required to publish)"
        required: false
        type: string
      publish:
        description: "Publish the release (unchecked = dry run only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Manual publish: validate the version and create the tag on the current
      # commit so GoReleaser picks it up. The tag is pushed with GITHUB_TOKEN,
      # which by design does not re-trigger the `push` event above (no double
      # release); the real release is run inline in the GoReleaser step below.
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            echo "::error::'version' is required when publishing"
            exit 1
          fi
          if ! printf '%s' "$version" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::'version' must look like vX.Y.Z (got '$version')"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "::error::tag '$version' already exists"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"

      # Real release on a tag push or a manual publish; otherwise a dry run
      # (`--snapshot` builds everything locally and skips publishing).
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            ${{ (github.event_name == 'push' || inputs.publish)
                && 'release --clean'
                || 'release --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
