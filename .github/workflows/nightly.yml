name: Nightly fuzz & corpus

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Heavy property tests + fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Heavy property tests + fuzzing (task nightly)
        run: task nightly
      - name: Build de-duplicated corpus
        run: task corpus
      - uses: actions/upload-artifact@v7
        with:
          name: corpus
          path: corpus/
          if-no-files-found: ignore
          retention-days: 14
